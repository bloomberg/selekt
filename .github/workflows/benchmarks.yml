name: 'Benchmarks'

on:
  schedule:
    - cron: '0 3 * * 6'
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

jobs:
  jmh:
    name: 'JMH Benchmarks'
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: 'Install system packages'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang gcc jq make sed tcl

      - name: 'Checkout'
        uses: actions/checkout@v7
        with:
          fetch-depth: 2
          submodules: recursive

      - name: 'Setup Java 17'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: 'Setup Java 25'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: 'Set JAVA_HOME'
        run: echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV

      - name: 'Cache mimalloc'
        id: cache-mimalloc
        uses: actions/cache@v6
        with:
          path: |
            /usr/local/lib/libmimalloc.a
            /usr/local/include/mimalloc.h
          key: mimalloc-benchmarks-linux-amd64-v3.3.2

      - name: 'Build mimalloc'
        if: steps.cache-mimalloc.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          curl -L https://github.com/microsoft/mimalloc/archive/refs/tags/v3.3.2.tar.gz -o mimalloc.tar.gz
          tar xzf mimalloc.tar.gz
          cd mimalloc-3.3.2
          mkdir -p out/release
          cd out/release
          cmake ../.. -DCMAKE_BUILD_TYPE=Release -DMI_BUILD_SHARED=OFF -DMI_BUILD_STATIC=ON -DMI_BUILD_TESTS=OFF -DMI_LOCAL_DYNAMIC_TLS=ON
          make -j$(nproc) mimalloc-static
          sudo mkdir -p /usr/local/lib /usr/local/include
          STATIC_LIB=""
          for candidate in libmimalloc.a libmimalloc-static.a; do
            if [ -f "$candidate" ]; then STATIC_LIB="$candidate"; break; fi
          done
          if [ -z "$STATIC_LIB" ]; then
            echo "ERROR: no mimalloc static lib produced. Build dir contents:"
            ls -la
            exit 1
          fi
          sudo cp "$STATIC_LIB" /usr/local/lib/libmimalloc.a
          sudo cp ../../include/mimalloc.h /usr/local/include/mimalloc.h

      - name: 'Configure Gradle'
        run: |
          echo 'org.gradle.caching=false' >> gradle.properties
          echo "org.gradle.java.home=${JAVA_HOME}" >> gradle.properties

      - name: 'Run JDBC benchmarks'
        run: ./gradlew :selekt-jdbc:jmh -Pjmh.includes="JdbcBatchBenchmark\..*BatchInsert" -Pjmh.profilers=gc -Pjmh.params="batchSize=1000"

      - name: 'Merge results'
        run: |
          jq -s 'add' \
            selekt-jdbc/build/results/jmh/results.json \
            > /tmp/combined-results.json

      - name: 'Extract GC allocation metrics'
        run: |
          jq '[.[] | . as $orig |
            ($orig.secondaryMetrics | to_entries[] | select(.key | endswith("gc.alloc.rate.norm")) | .value) as $alloc |
            ($orig | del(.secondaryMetrics) | .primaryMetric = ($alloc + {scoreUnit: "B/op"}) | .secondaryMetrics = {})
          ]' /tmp/combined-results.json > /tmp/combined-alloc-results.json
          echo "Allocation entries: $(jq length /tmp/combined-alloc-results.json)"
          jq '.[0] | {benchmark, mode, forks, scoreUnit: .primaryMetric.scoreUnit, score: .primaryMetric.score}' /tmp/combined-alloc-results.json

      - name: 'Validate results'
        run: |
          for f in /tmp/combined-results.json /tmp/combined-alloc-results.json; do
            jq 'length' "$f"
            if jq -e '[.[] | select(.benchmark == null)] | length > 0' "$f" > /dev/null 2>&1; then
              echo "::error::Found entries with null benchmark field in $f"
              jq '[.[] | select(.benchmark == null)]' "$f"
              exit 1
            fi
          done

      - name: 'Restore working tree'
        run: git checkout -- .

      - name: 'Store benchmark results'
        uses: benchmark-action/github-action-benchmark@v1.22.1
        with:
          name: 'JDBC Benchmarks'
          tool: 'jmh'
          output-file-path: /tmp/combined-results.json
          benchmark-data-dir-path: benchmarks/jmh
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false

      - name: 'Store allocation results'
        uses: benchmark-action/github-action-benchmark@v1.22.1
        with:
          name: 'JDBC Allocations'
          tool: 'jmh'
          output-file-path: /tmp/combined-alloc-results.json
          benchmark-data-dir-path: benchmarks/jmh-alloc
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: false

      - name: 'Upload raw results'
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: 'JMH Results'
          path: |
            selekt-jdbc/build/results/jmh/
