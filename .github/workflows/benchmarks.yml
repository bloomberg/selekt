name: 'Benchmarks'

on:
  schedule:
    - cron: '0 3 * * 6'
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

jobs:
  jmh:
    name: 'JMH Benchmarks'
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: 'Install system packages'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang gcc jq make sed tcl

      - name: 'Checkout'
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          submodules: recursive

      - name: 'Setup Java 17'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: 'Setup Java 25'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: 'Set JAVA_HOME'
        run: echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV

      - name: 'Configure Gradle'
        run: |
          echo 'org.gradle.caching=false' >> gradle.properties
          echo "org.gradle.java.home=${JAVA_HOME}" >> gradle.properties

      - name: 'Run JDBC benchmarks'
        run: ./gradlew :selekt-jdbc:jmh -Pjmh.includes="JdbcBatchBenchmark\..*BatchInsert" -Pjmh.profilers=gc -Pjmh.params="batchSize=1000"

      - name: 'Merge results'
        run: |
          jq -s 'add' \
            selekt-jdbc/build/results/jmh/results.json \
            > /tmp/combined-results.json

      - name: 'Extract GC allocation metrics'
        run: |
          jq '[.[] | . as $orig |
            ($orig.secondaryMetrics | to_entries[] | select(.key | endswith("gc.alloc.rate.norm")) | .value) as $alloc |
            ($orig | del(.secondaryMetrics) | .primaryMetric = $alloc | .secondaryMetrics = {})
          ]' /tmp/combined-results.json > /tmp/combined-alloc-results.json
          echo "Allocation entries: $(jq length /tmp/combined-alloc-results.json)"
          jq '.[0] | {benchmark, mode, forks, scoreUnit: .primaryMetric.scoreUnit, score: .primaryMetric.score}' /tmp/combined-alloc-results.json

      - name: 'Validate results'
        run: |
          for f in /tmp/combined-results.json /tmp/combined-alloc-results.json; do
            jq 'length' "$f"
            if jq -e '[.[] | select(.benchmark == null)] | length > 0' "$f" > /dev/null 2>&1; then
              echo "::error::Found entries with null benchmark field in $f"
              jq '[.[] | select(.benchmark == null)]' "$f"
              exit 1
            fi
          done

      - name: 'Restore working tree'
        run: git checkout -- .

      - name: 'Store benchmark results'
        uses: benchmark-action/github-action-benchmark@v1.20.4
        with:
          name: 'JDBC Benchmarks'
          tool: 'jmh'
          output-file-path: /tmp/combined-results.json
          benchmark-data-dir-path: benchmarks/jmh
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false

      - name: 'Store allocation results'
        uses: benchmark-action/github-action-benchmark@v1.20.4
        with:
          name: 'JDBC Allocations'
          tool: 'jmh'
          output-file-path: /tmp/combined-alloc-results.json
          benchmark-data-dir-path: benchmarks/jmh-alloc
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: false

      - name: 'Upload raw results'
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: 'JMH Results'
          path: |
            selekt-jdbc/build/results/jmh/
