name: 'Periodic Integration Tests'

on:
  schedule:
    - cron: '0 22 * * SUN'

permissions: read-all

jobs:
  ci-pipeline:
    name: 'Continuous Integration'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: 'Install system packages'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang gcc make sed tcl
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - name: 'Cache jemalloc'
        id: cache-jemalloc
        uses: actions/cache@v6
        with:
          path: |
            /usr/local/lib/libjemalloc.a
            /usr/local/include/jemalloc
          key: jemalloc-periodic-integration-linux-amd64-v5.3.1
      - name: 'Build jemalloc'
        if: steps.cache-jemalloc.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          curl -L https://github.com/jemalloc/jemalloc/releases/download/5.3.1/jemalloc-5.3.1.tar.bz2 -o jemalloc.tar.bz2
          tar xjf jemalloc.tar.bz2
          cd jemalloc-5.3.1
          ./configure --disable-shared --enable-static --with-jemalloc-prefix=""
          make -j$(nproc) build_lib_static
          sudo mkdir -p /usr/local/lib /usr/local/include/jemalloc
          if [ ! -f lib/libjemalloc.a ]; then
            echo "ERROR: no jemalloc static lib produced. Build dir contents:"
            ls -la lib || true
            exit 1
          fi
          sudo cp lib/libjemalloc.a /usr/local/lib/libjemalloc.a
          sudo cp -R include/jemalloc/. /usr/local/include/jemalloc/
      - name: 'Integration tests'
        run: |
          ./gradlew integrationTest
